services:

  # ─── Base de datos ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:17-alpine3.22
    container_name: online_fly_postgres
    restart: unless-stopped
    env_file: ./backend/.env          # Lee POSTGRES_USER / PASSWORD / DB desde el .env del backend
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-online_fly}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - online_fly_network

  # ─── Backend (FastAPI) ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: online_fly_backend
    restart: unless-stopped
    env_file: ./backend/.env          # Todas las variables del .env (SECRET_KEY, JWT, SMTP, etc.)
    environment:
      # Dentro de Docker el host de la BD es el nombre del servicio, no "localhost"
      POSTGRES_SERVER: postgres
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy    # Espera a que PostgreSQL acepte conexiones
    networks:
      - online_fly_network

  # ─── Frontend (Next.js) ───────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # URL del backend vista desde el NAVEGADOR (no desde dentro de Docker)
        # Cambiar a la IP o dominio real del servidor en producción
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: online_fly_frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - online_fly_network


volumes:
  postgres_data:
    name: online_fly_postgres_data

networks:
  online_fly_network:
    name: online_fly_network
