services:
  postgres:
    image: postgres:17-alpine3.22
    container_name: online_fly_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: online_fly_user
      POSTGRES_PASSWORD: online_fly_password
      POSTGRES_DB: online_fly_app
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U online_fly_user -d online_fly_app"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - online_fly_network

volumes:
  postgres_data:
    name: online_fly_postgres_data

networks:
  online_fly_network:
    name: online_fly_network
